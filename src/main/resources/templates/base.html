<!DOCTYPE html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="layout(content)"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=], initial-scale=1.0" />
    <title th:text="${tittle}">Base</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" type="image/png" th:href="@{/img/sb.jpg}">
  </head>
  <body>
    <!-- navbar start -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
      <div class="container-fluid">
        <a
          th:if="${loggedInUser}"
          class="navbar-brand"
          th:href="@{/admin/home}"
        >
          <img th:src="@{/img/sb.jpg}" style="width: 30px" alt="" />
          <span class="d-none d-lg-inline"
            >S.B. Jain Institute of Technology and Management Research</span
          >
          <span class="d-inline d-lg-none">S.B. Jain Institute</span>
        </a>
        <a th:unless="${loggedInUser}" class="navbar-brand" th:href="@{/}">
          <img th:src="@{/img/sb.jpg}" style="width: 30px" alt="" />
          <span class="d-none d-lg-inline"
            >S.B. Jain Institute of Technology and Management Research</span
          >
          <span class="d-inline d-lg-none">S.B. Jain Institute</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li th:unless="${loggedInUser}" class="nav-item">
              <a
                th:href="@{/}"
                class="btn btn-outline-success nav-link text-white"
                >Home</a
              >
            </li>
            <li th:unless="${loggedInUser}" class="nav-item">
              <a
                th:href="@{/admin/login}"
                class="btn btn-outline-primary text-white nav-link"
                >Admin Login</a
              >
            </li>
            <li th:unless="${loggedInUser}" class="nav-item">
              <a
                th:href="@{/search}"
                class="btn btn-outline-success text-white nav-link"
                >View Result</a
              >
            </li>
            <li th:if="${loggedInUser}" class="nav-item">
              <a
                th:href="@{/admin/home}"
                class="btn btn-outline-success text-white nav-link"
                >Home</a
              >
            </li>
            <li th:if="${loggedInUser}" class="nav-item">
              <a
                th:href="@{/admin/home/students-with-backlog}"
                class="btn btn-outline-warning text-white nav-link"
                >Backlog Students</a
              >
            </li>
            <li th:if="${loggedInUser}" class="nav-item">
              <a
                th:href="@{/admin/add-student}"
                class="btn btn-outline-primary text-white nav-link"
                >Add Student</a
              >
            </li>
            <li th:if="${loggedInUser}" class="nav-item">
              <a
                th:href="@{/logout}"
                class="btn btn-outline-danger text-white nav-link"
                >Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- navbar end -->

    <div class="container-fluid" th:replace="${content}"></div>

    <script th:src="@{/js/script.js}"></script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js"
      integrity="sha512-AA1Bzp5Q0K1KanKKmvN/4d3IRKVlv9PYgwFPvm32nPO6QS8yH1HO7LbgB1pgiOxPtfeg5zEn2ba64MUcqJx6CA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </body>
</html>
